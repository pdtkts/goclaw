# GoClaw builtin hooks registry.
#
# Each entry is shipped with the binary (`//go:embed *.js`) and seeded into
# agent_hooks at startup with source='builtin' and a stable UUIDv5. Users may
# toggle `enabled` on these rows but cannot edit content — the embedded JS is
# the canonical source at every boot.
#
# Schema:
#   id             kebab-case stable identifier (never rename — breaks UUIDv5)
#   version        integer; bump to force startup overwrite of matching rows
#   events         list of HookEvent values (session_start, user_prompt_submit,
#                  pre_tool_use, post_tool_use, stop, subagent_start,
#                  subagent_stop). One DB row is created per event.
#   scope          global | tenant | agent (builtins default to global)
#   matcher        optional regex applied to tool_name (pre/post_tool_use only)
#   if_expr        optional CEL expression pre-filter
#   timeout_ms     per-hook wall-clock budget
#   on_timeout     allow | block (fail-closed for blocking events)
#   priority       higher = runs earlier in the chain
#   mutable_fields per-hook allowlist of dotted paths the script may mutate
#                  via updatedInput (e.g. rawInput, toolInput.command)
#   source_file    name of the .js file sitting next to this YAML
#   description    short human summary; surfaced in docs/UI
#
# Phase 04 ships this registry empty. Phase 05 adds the first exemplar
# (pii-redactor). When adding a builtin, also add the .js file + remove
# the _placeholder.js once at least one real source_file exists.
builtins: []
